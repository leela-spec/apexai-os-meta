name: Apex KB Phase 0 Start Repair

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [agent/apex-kb-phase0-start-repair]

permissions:
  contents: write

jobs:
  repair-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/apex-kb-phase0-start-repair
          fetch-depth: 0

      - name: Apply exact public CLI and test corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          cli = Path("apex-meta/scripts/apex_kb.py")
          text = cli.read_text(encoding="utf-8")
          old_commands = '"control", "scaffold", "source-intake", "hash", "generate-source-payload-manifest", "source-payload-manifest",'
          new_commands = '"start", "control", "scaffold", "source-intake", "hash", "generate-source-payload-manifest", "source-payload-manifest",'
          if text.count(old_commands) != 1:
              raise SystemExit(f"commands anchor count: {text.count(old_commands)}")
          text = text.replace(old_commands, new_commands, 1)

          old_parser = '''    start_cmd = sub.add_parser("start", help="Validate and preview or initialize one Apex KB Setup configuration")
              start_cmd.add_argument("--config", required=True, help="Path to the operator Start YAML configuration")
              start_cmd.add_argument("--repo-root", help="Repository checkout or linked-worktree path used for read-only topology discovery")
              start_cmd.set_defaults(func=cmd_start)
          '''
          new_parser = '''    start_cmd = sub.add_parser("start", help="Validate and preview or initialize one Apex KB Setup configuration")
              start_cmd.add_argument("--config", required=True, help="Path to the operator Start YAML configuration")
              start_cmd.add_argument("--repo-root", help="Repository checkout or linked-worktree path used for read-only topology discovery")
              start_cmd.add_argument("--allow-write", action="store_true", default=argparse.SUPPRESS, help="Permit confirmed Setup writes")
              start_cmd.add_argument("--dry-run", action="store_true", default=argparse.SUPPRESS, help="Preview only; create no KB files")
              start_cmd.add_argument("--strict", action="store_true", default=argparse.SUPPRESS, help="Use strict validation")
              start_cmd.add_argument("--json", action="store_true", default=argparse.SUPPRESS, help="Emit machine-readable JSON")
              start_cmd.set_defaults(func=cmd_start)
          '''
          if text.count(old_parser) != 1:
              raise SystemExit(f"start parser anchor count: {text.count(old_parser)}")
          cli.write_text(text.replace(old_parser, new_parser, 1), encoding="utf-8", newline="\n")

          tests = Path("apex-meta/scripts/tests/test_apex_kb_start.py")
          test_text = tests.read_text(encoding="utf-8")
          replacements = {
              'start.GitResult(0, "/repo\\n", "")': 'subprocess.CompletedProcess([], 0, "/repo\\n", "")',
              'start.GitResult(0, "worktree /repo\\nHEAD abc123\\nbranch refs/heads/main\\n\\n", "")': 'subprocess.CompletedProcess([], 0, "worktree /repo\\nHEAD abc123\\nbranch refs/heads/main\\n\\n", "")',
              'start.GitResult(0, "https://github.com/test/fixture.git\\n", "")': 'subprocess.CompletedProcess([], 0, "https://github.com/test/fixture.git\\n", "")',
              'start.GitResult(0, "abc123\\n", "")': 'subprocess.CompletedProcess([], 0, "abc123\\n", "")',
          }
          for old, new in replacements.items():
              if test_text.count(old) != 1:
                  raise SystemExit(f"test anchor count for {old}: {test_text.count(old)}")
              test_text = test_text.replace(old, new, 1)
          tests.write_text(test_text, encoding="utf-8", newline="\n")
          PY

      - name: Run Start tests
        id: start_tests
        shell: bash
        run: |
          set +e
          python -m unittest apex-meta/scripts/tests/test_apex_kb_start.py -v > start-test-result.txt 2>&1
          status=$?
          cat start-test-result.txt
          exit $status

      - name: Commit exact failure report
        if: failure() && github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add start-test-result.txt
          git commit -m "Record Apex KB Start test failure"
          git push origin HEAD:agent/apex-kb-phase0-start-repair

      - name: Run control-plane tests
        run: python -m unittest discover -s apex-meta/scripts/tests -p "test_apex_kb_control*.py" -v

      - name: Prove Start help
        run: python apex-meta/scripts/apex_kb.py start --help

      - name: Commit verified repair and remove temporary workflow
        if: github.event_name == 'push'
        shell: bash
        run: |
          rm .github/workflows/apex-kb-phase0-start-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apex-meta/scripts/apex_kb.py apex-meta/scripts/tests/test_apex_kb_start.py .github/workflows/apex-kb-phase0-start-repair.yml
          git commit -m "Expose and verify the Apex KB Start CLI"
          git push origin HEAD:agent/apex-kb-phase0-start-repair
