document:
  id: apex-step3-canonical-artifact-family-and-lifecycle-map
  title: APEX Canonical J1-J12 Artifact Family and Lifecycle Map
  status: verified_navigation_projection
  created_date: 2026-07-11
  repository: leela-spec/apexai-os-meta
  branch: main
  package_path: apex-meta/operator-output-design/step3-output-design-system/

purpose: >
  Provide one navigable projection of the twelve artifact jobs and their
  lifecycle handoffs without replacing round-level design authorities.

artifacts:
  J1:
    artifact: Project_State_Success_Card
    job: establish_safe_project_state_for_planning
    role: planning_state_input
    owner: project-state-success
    inputs: project_sources_and_recent_evidence
    outputs: accepted_project_state_context
    must_not_own: weekly_direction_or_execution_plan
  J2:
    artifact: Weekly_Command_Brief
    job: turn_state_into_weekly_direction
    role: weekly_work_plan
    owner: precap-week
    inputs: J1_project_state_and_week_context
    outputs: weekly_priorities_and_work_plan
    must_not_own: next_day_execution_detail
  J3:
    artifact: PreCap_Next_Day_Brief
    job: turn_weekly_and_state_context_into_next_day_outline
    role: compact_three_sprint_day_outline
    owner: precap-next-day
    inputs: J1_state_and_J2_weekly_direction
    outputs: day_level_flow_and_sprint_summary
    must_not_own: complete_execution_depth
  J4:
    artifact: Flow_Execution_Card
    job: make_one_planned_flow_directly_executable
    role: complete_execution_workspace
    owner: flow-execution-card
    inputs: J3_flow_ref_and_J12_approved_route_when_present
    outputs: full_sprint_execution_context
    must_not_own: final_prompt_content_or_durable_status
  J5:
    artifact: Flow_Prompt_Pack
    job: provide_direct_prompt_access_for_execution
    role: prompt_file_projection
    owner: prompt-engineering
    inputs: J4_execution_context
    outputs: prompt_files_and_index
    must_not_own: route_decision_or_project_plan
  J6:
    artifact: Execution_Evidence_Handoff
    job: organize_evidence_after_execution
    role: evidence_handoff
    owner: execution-evidence
    inputs: operator_execution_results
    outputs: organized_execution_evidence
    must_not_own: interpretation_of_project_state
  J7:
    artifact: FlowRecap_Result_Card
    job: interpret_execution_evidence
    role: result_and_candidate_state_interpretation
    owner: flow-recap
    inputs: J6_evidence_handoff
    outputs: execution_result_and_candidate_status_delta
    must_not_own: durable_merge
  J8:
    artifact: Usage_Learning_Card
    job: capture_reusable_usage_learning
    role: advisory_learning_signal
    owner: usage-learning
    inputs: J7_result_and_usage_delta
    outputs: advisory_routing_evidence
    must_not_own: automatic_route_override
  J9:
    artifact: Status_Merge_Decision_Card
    job: review_candidate_state_before_merge
    role: merge_review_and_approval
    owner: status-merge
    inputs: J7_candidate_status_delta
    outputs: approved_change_for_KB_update
    must_not_own: confirmed_durable_write
  J10:
    artifact: Project_KB_Update_Card
    job: prepare_or_execute_project_KB_update
    role: durable_write_boundary
    owner: project-kb-manager
    inputs: J9_approved_change
    outputs: durable_update_result_and_freshness
    must_not_own: unconfirmed_overview_truth
  J11:
    artifact: Project_Status_Overview
    job: show_confirmed_cross_project_active_landscape
    role: accepted_overview_truth_projection
    owner: project-status-overview
    inputs: J10_confirmed_durable_update_result
    outputs: accepted_status_and_freshness_context
    must_not_own: candidate_acceptance_or_status_merge
  J12:
    artifact: AI_Routing_Card
    job: recommend_route_before_execution
    role: advisory_routing_decision
    owner: ai-routing-and-usage-tracking
    inputs: J8_learning_and_J11_project_context
    outputs: operator_approved_route_context
    must_not_own: automatic_execution_or_final_volatile_model_truth

lifecycles:
  planning:
    sequence: J1 -> J2 -> J3
  execution:
    sequence: J3 -> J4 -> J5 -> operator_execution -> J6
  recap_and_learning:
    sequence: J6 -> J7 -> J8
  durable_state:
    sequence: J7 -> J9 -> J10 -> J11
  routing:
    sequence: J8 + J11 -> J12 -> J4/J5_after_operator_approval

minimum_handoffs:
  J1_to_J2: project_state_context
  J2_to_J3: weekly_direction_and_priorities
  J3_to_J4: summarized_flow_and_sprint_refs
  J4_to_J5: execution_prompt_requirements
  execution_to_J6: evidence_and_execution_record
  J6_to_J7: organized_evidence
  J7_to_J9: candidate_state_and_evidence
  J9_to_J10: approved_change_for_KB_write
  J10_to_J11: confirmed_durable_result_ref_and_freshness
  J8_to_J12: advisory_usage_learning
  J11_to_J12: current_project_context
  J12_to_J4_J5: operator_approved_route

state_boundaries:
  candidate_to_approval: J7_proposes_and_J9_reviews
  approval_to_confirmed_write: J9_approval_requires_J10_execution
  confirmed_write_to_overview_truth: J10_result_required_before_J11_projection
  learning_to_route: J8_is_advisory_and_J12_requires_operator_decision
  route_to_execution: J12_approved_route_enters_J4_and_J5

local_relationship_authorities:
  planning:
    - 03-planning-artifact-designs.okf.yaml
  execution_and_evidence:
    - 08-round3-cross-artifact-relationship.okf.yaml
  recap_and_learning:
    - 12-round4-cross-artifact-relationship.okf.yaml
  state_and_routing:
    - 18-round5-cross-artifact-relationships.okf.yaml
  authority_rule: this_file_is_navigation_projection_not_replacement_authority

forbidden_shortcuts:
  - J3_summary_to_full_execution_without_J4
  - J6_evidence_to_project_state_without_J7
  - J7_candidate_to_merged_state_without_J9
  - J9_approval_to_confirmed_write_without_J10
  - J10_prepared_update_to_J11_truth
  - J8_learning_to_automatic_route
  - J12_recommendation_to_execution_without_operator_approval

acceptance_checks:
  all_twelve_artifacts_are_mapped: true
  planning_execution_recap_durable_and_routing_lifecycles_are_present: true
  minimum_handoffs_are_explicit: true
  candidate_approval_write_and_overview_boundaries_are_explicit: true
  local_round_authorities_are_preserved: true
  navigation_projection_does_not_replace_detail_authorities: true
