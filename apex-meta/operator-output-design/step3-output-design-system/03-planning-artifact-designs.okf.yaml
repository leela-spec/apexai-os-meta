document:
  id: apex-step3-planning-artifact-designs
  title: APEX Step 3 Planning Artifact Designs
  status: verified_by_operator
  created_date: 2026-07-10
  repository: leela-spec/apexai-os-meta
  branch: main
  package_path: apex-meta/operator-output-design/step3-output-design-system/
  covers_output_jobs:
    - J1_project_state_success_card
    - J2_weekly_command_brief
    - J3_PreCap_Next_Day_Brief
  verification:
    verified_by: Marco
    decision: all_validated
    verification_date: 2026-07-10

scope:
  purpose: >
    Define the operator-facing presentation architecture for project-state,
    weekly-planning, and next-day-planning outputs while preserving existing
    contract ownership and full planning depth.
  does_not_redefine:
    - project_state_packet_schema
    - weekly_plan_packet_schema
    - next_day_plan_schema
    - flow_packet_schema
    - flow_prompt_pack_schema

planning_depth_rule:
  result_card_is_compact: true
  underlying_plan_is_not_forced_to_be_compact: true
  arbitrary_priority_caps_forbidden: true
  compression_allowed_only_when:
    - operator_requests_compact_view
    - flow_is_explicitly_compressed
    - omitted_or_skipped_work_has_a_reason
    - detail_is_available_through_a_direct_reference

  weekly_plan_must_make_visible:
    - each_active_project
    - project_level_outcomes
    - project_level_priorities
    - planned_work_items
    - expected_outputs
    - blockers
    - decisions
    - cross_project_dependencies
    - optional_daily_distribution

  daily_plan_must_make_visible:
    - project_manager_context_used
    - weekly_priorities_advanced
    - all_represented_flows
    - three_sprints_per_full_flow
    - sprint_tasks
    - sprint_outputs
    - execution_sequence
    - review_conditions
    - end_of_day_expected_state

J1_project_state_success_card:
  operator_name: Project State Success Card
  primary_question: What project reality is safe and useful to plan from now?
  role: planning_context_input

  result_card:
    required:
      - result_state
      - concise_portfolio_summary
      - best_immediate_operator_action
      - highest_impact_review_question_or_none
    confidence:
      show_when: below_high_or_materially_relevant

  project_state_detail:
    per_project_fields:
      - project_name
      - current_phase
      - current_goal
      - active_workstreams
      - accepted_priorities
      - next_action_candidates
      - blockers
      - stale_or_conflicting_information
      - important_artifact_refs

  planning_handoff:
    states:
      - usable_for_PreCapWeek
      - usable_for_PreCapNextDay
      - review_needed_before_planning
      - blocked_for_planning

  operator_actions:
    - use_as_context
    - edit_context
    - mark_stale
    - reject_context
    - request_more_evidence

  primary_view_excludes:
    - full_project_database
    - full_source_inventory
    - detailed_milestone_history
    - internal_record_identifiers
    - technical_validation_trace

J2_weekly_command_brief:
  operator_name: Weekly Command Brief
  primary_question: >
    What should this week accomplish across all active projects, and what needs
    operator review before the week begins?
  role: weekly_direction_and_project_work_plan

  result_card:
    required:
      - result_state
      - portfolio_direction_summary
      - active_project_count
      - major_outcome_count
      - next_operator_action
      - highest_impact_review_items
    summary_depth: two_to_five_sentences_when_needed

  weekly_priority_policy:
    fixed_global_maximum: null
    minimum_major_weekly_outcomes_across_portfolio: 3
    normal_major_outcomes_per_active_project:
      min: 1
      max: 5
    normal_action_items_per_project:
      min: 1
      max: 7
    extended_action_items_per_project_when_justified:
      max: 10
    one_priority_per_project_per_day:
      role: optional_planning_heuristic
      rigid_quota: false
    planning_basis:
      - number_of_active_projects
      - project_complexity
      - available_weekly_capacity
      - deadlines
      - dependencies
      - operator_intent
    compression_rule: >
      Do not remove meaningful work merely to meet an arbitrary display limit.
      Group related work under project outcomes when readability requires it.

  portfolio_level_weekly_direction:
    fields:
      - weekly_intent
      - major_cross_project_outcomes
      - capacity_and_constraints
      - major_operator_decisions

  project_sections:
    one_section_per_active_project: true
    format: OKF_style_hierarchical_bullets
    fields:
      - project
      - weekly_target
      - success_evidence
      - why_this_week
      - priorities
      - desired_results
      - planned_work
      - dependencies
      - blockers_and_risks
      - decisions_needed
      - expected_outputs
      - optional_candidate_days

  cross_project_sequence:
    fields:
      - must_happen_first
      - can_run_in_parallel
      - should_not_compete
      - deferred_deliberately_with_reason

  daily_seed_map:
    purpose: suggest_distribution_without_freezing_the_week
    may_include:
      - weekday
      - candidate_projects
      - likely_outcomes
      - dependencies
    final_daily_planning_owner: PreCapNextDay

  operator_actions:
    - approve_week
    - edit_project_priorities
    - add_or_remove_planned_work
    - reduce_scope
    - defer_priority
    - resolve_constraint
    - reject_weekly_direction

  primary_view_excludes:
    - full_flow_packets
    - full_prompt_packs
    - project_execution
    - durable_state_mutation

J3_PreCap_Next_Day_Brief:
  operator_name: PreCap Next Day Brief
  previous_operator_label_rejected: Tomorrow Action Brief
  produced_by: precap-next-day
  machine_artifact: next_day_plan
  primary_question: >
    What should happen on the next execution day, across which projects, flows,
    and sprints, and what must be reviewed before execution starts?
  role: compact_day_level_three_sprint_outline

  result_card:
    required:
      - result_state
      - day_direction_summary
      - represented_flow_counts
      - total_sprints_planned
      - key_expected_outputs
      - next_operator_action
      - review_needed
    summary_depth: two_to_five_sentences_when_needed

  day_strategy:
    fields:
      - primary_day_outcomes
      - projects_touched
      - reason_for_each_project
      - intended_day_progress
      - continuity_from_week
      - capacity_assumptions
      - fixed_constraints

  flow_overview:
    one_entry_per_represented_flow: true
    supported_states:
      - planned
      - compressed
      - skipped
      - blocked
      - omitted
    fields:
      - flow_id
      - project
      - flow_title
      - flow_status
      - why_this_flow_today
      - connection_to_weekly_priority
      - flow_goals
      - expected_flow_outputs
      - available_context
      - missing_context
      - dependencies
      - review_flags

  day_level_three_sprint_outline:
    required_for_each_full_active_flow: true
    sprint_count: 3
    depth_rule: >
      Keep all three sprints visible at day level, but place complete tasks,
      inputs, prompt links, dependencies, done conditions, and stop or review
      conditions in the referenced Flow Execution Card.

    S1:
      role: first_work_sprint
      fields:
        - goal
        - short_intent
        - expected_output_summary
        - flow_execution_card_ref

    S2:
      role: second_work_or_deepening_sprint
      fields:
        - goal
        - short_intent
        - dependency_summary
        - expected_output_summary
        - flow_execution_card_ref

    S3:
      role: recap_capture_handoff_sprint
      fields:
        - goal
        - short_intent
        - expected_handoff_summary
        - flow_execution_card_ref

  execution_sequence:
    purpose: show_actual_order_across_flows_and_sprints
    fields:
      - order
      - flow
      - sprint
      - reason_for_order
    allowed_patterns:
      - complete_one_flow_before_next
      - interleave_flows
      - compress_sprint_with_reason

  planning_context_used:
    fields:
      - project_manager_inputs_per_project
      - weekly_plan_inputs
      - recent_execution_inputs
      - ignored_or_deferred_signals_with_reason
    purpose: make_planning_rationale_visible

  expected_end_of_day:
    fields:
      - project_progress
      - expected_changes
      - expected_artifacts
      - decisions_expected
      - evidence_to_capture
      - handoffs_prepared

  operator_actions:
    - approve_day
    - open_first_flow_execution_card
    - reorder_flows_or_sprints
    - edit_flow_scope
    - compress_flow_with_reason
    - defer_flow
    - mark_flow_blocked
    - approve_calendar_request_when_separate_gate_exists

  primary_view_excludes:
    - complete_sprint_task_and_input_detail
    - full_prompt_link_sets_and_prompt_text
    - detailed_done_and_stop_conditions
    - FlowRecap_results
    - durable_status_mutation
    - copied_contract_schemas

cross_artifact_relationship:
  sequence:
    - Project_State_Success_Card
    - Weekly_Command_Brief
    - PreCap_Next_Day_Brief
    - Flow_Execution_Cards
  rules:
    project_state_is_referenced_not_reprinted: true
    weekly_priorities_are_carried_forward_with_traceability: true
    full_flow_details_may_be_summarized_in_day_brief_and_expanded_in_flow_card: true
    sprint_structure_must_remain_visible: true
    planning_rationale_must_remain_auditable: true

acceptance_checks:
  J1_is_state_input_not_weekly_plan: true
  J2_has_per_project_OKF_work_plan: true
  J2_has_no_arbitrary_three_priority_cap: true
  J2_allows_one_to_seven_normal_work_items_per_project: true
  J2_allows_up_to_ten_when_justified: true
  J3_operator_name_matches_skill: true
  J3_machine_artifact_remains_next_day_plan: true
  J3_three_sprints_preserved_per_full_flow: true
  J3_summarizes_and_J4_owns_complete_execution_depth: true
  J3_project_manager_context_used_is_visible: true
  result_cards_do_not_replace_detailed_plans: true
  existing_domain_contracts_remain_authoritative: true
