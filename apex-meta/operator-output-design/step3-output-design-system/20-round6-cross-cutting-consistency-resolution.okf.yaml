document:
  id: apex-step3-round6-cross-cutting-consistency-resolution
  title: APEX Step 3 Round 6 Cross-Cutting Consistency Resolution
  status: verified_design_resolution
  created_date: 2026-07-11
  repository: leela-spec/apexai-os-meta
  branch: main
  package_path: apex-meta/operator-output-design/step3-output-design-system/

resolution:
  universal_state_enum:
    allowed: false
  principle: >
    Lifecycle concepts remain distinct where different artifacts own their
    meaning; shared vocabulary must not collapse domain boundaries.

state_vocabulary:
  execution_result_state:
    owner: J7_FlowRecap_Result_Card
    meaning: outcome_of_executed_flow_work
  candidate_state:
    owner: J7_FlowRecap_Result_Card
    meaning: proposed_project_status_change_before_merge_review
  approval_state:
    owner: J9_Status_Merge_Decision_Card
    meaning: operator_review_and_merge_decision
  durable_write_state:
    owner: J10_Project_KB_Update_Card
    meaning: KB_write_preparation_execution_and_result_evidence
  overview_truth_state:
    owner: J11_Project_Status_Overview
    meaning: confirmed_accepted_project_state_with_freshness
  routing_decision_state:
    owner: J12_AI_Routing_Card
    meaning: advisory_route_recommendation_and_operator_route_decision

domain_ownership:
  J7:
    owns: flow_result_states
  J9:
    owns: merge_review_states
  J10:
    owns: KB_write_status_and_result_evidence
  J11:
    owns: accepted_overview_truth_and_freshness
  J12:
    owns: advisory_routing_and_operator_route_decisions

translations:
  J7_to_J9:
    input_state: flow_result
    output_role: candidate_review
  J9_to_J10:
    input_state: approved_change
    output_role: KB_write_input
  J10_to_J11:
    input_state: confirmed_durable_result
    output_role: overview_truth
  J8_to_J12:
    input_state: usage_learning
    output_role: advisory_routing_evidence
  J12_to_execution:
    input_state: operator_approved_route
    output_role: execution_context

forbidden_shortcuts:
  - completed_flow_to_merged_project_state
  - approval_to_confirmed_write
  - prepared_update_to_overview_truth
  - recommendation_to_automatic_execution
  - skipped_or_blocked_write_to_effective_change
  - unverified_exact_model_to_route_truth

boundary_rules:
  J7_does_not_claim_durable_merge: true
  J9_approval_is_not_durable_write_confirmation: true
  J10_result_reference_is_required_for_confirmed_write: true
  J11_projects_only_confirmed_durable_state: true
  J12_recommendation_requires_operator_route_decision_before_execution: true
  state_names_are_not_interchangeable_across_domains: true

acceptance_checks:
  universal_state_enum_is_rejected: true
  execution_result_and_candidate_states_are_separate: true
  approval_and_durable_write_states_are_separate: true
  durable_write_and_overview_truth_states_are_separate: true
  routing_decision_state_is_advisory_until_operator_approved: true
  all_required_translations_are_explicit: true
  forbidden_shortcuts_are_explicit: true
  domain_state_authorities_are_preserved: true
