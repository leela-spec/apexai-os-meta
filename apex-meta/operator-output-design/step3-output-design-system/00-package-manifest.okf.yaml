package_identity:
  package_name: step3-output-design-system
  purpose: >
    Define the operator-facing presentation system for the twelve locked APEX
    output jobs J1-J12, including shared anatomy, artifact-specific designs,
    minimum cross-artifact handoffs, lifecycle boundaries, and decision records.
  design_layer: operator_facing_presentation_and_handoff
  schema_authority: existing_skill_and_reference_contracts
  runtime_role: none

scope:
  owns:
    - operator_output_design_principles
    - shared_card_and_brief_anatomy
    - J1_to_J12_operator_artifact_designs
    - minimum_cross_artifact_relationships
    - canonical_artifact_and_lifecycle_projection
    - round_decision_and_verification_records
  must_not_own:
    - underlying_domain_schemas
    - runtime_execution
    - autonomous_orchestration
    - calendar_writes
    - prompt_execution
    - durable_project_state_outside_owner_skills

current_status:
  completed_rounds:
    - round_1_and_2_foundations
    - round_3_execution_prompt_and_evidence_design
    - round_4_recap_and_usage_learning_design
    - round_5_state_overview_and_routing_design
  round_6_status: in_progress_iterative_reconciliation
  operator_verified_source_files: 01_to_19
  round_6_new_files_present:
