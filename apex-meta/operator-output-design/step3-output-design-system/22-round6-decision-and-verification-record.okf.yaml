accepted_round_6_resolutions:
  canonical_names:
    - PreCap_Next_Day_Brief
    - Prompt_Files_and_Index
    - Execution_Evidence_Handoff
    - Skip_Marker_as_conditional_subcase
  planning_depth:
    J3: compact_day_level_three_sprint_outline
    J4: complete_flow_execution_depth
  durable_state_path:
    sequence:
      - J7_candidate_change
      - J9_review_and_approval
      - J10_confirmed_durable_write
      - J11_overview_truth_projection
    rules:
      approval_is_not_write_confirmation: true
      prepared_write_is_not_current_truth: true
      durable_update_result_ref_required_for_new_overview_truth: true
  project_status_alignment:
    hierarchy: project_task_subtask
    workstreams_forbidden: true
    ranked_task_view_required: true
    unassigned_is_temporary: true
  routing_alignment:
    stable_surface_class_is_default_identity: true
    exact_model_requires_current_verification: true
    routing_recommendation_is_not_execution: true
  state_vocabulary:
    universal_state_enum_created: false
    domain_owned_states_preserved: true

source_integrity:
  source_design_files_modified_in_round_6: false
  patch_artifacts_applied: false
  skill_contracts_modified: false
  runtime_files_created_or_modified: false
  calendar_writes_created: false
  durable_project_state_mutated: false
  drift_check:
    live_GitHub_source_SHAs_match_pre_patch_versions: true
    files_20_and_21_match_created_versions: true
    local_uncommitted_state_visible_to_GitHub: false

round_6_completion:
  design_reconciliation_complete: true
  canonical_artifact_family_defined: true
  canonical_lifecycle_projection_defined: true
  state_translation_rules_defined: true
  patch_artifacts_created_and_verified: true
  patch_application_complete: false
  operator_verification_record_created: true
  templates_created: false
  runtime_created: false
  round_6_status: complete_at_design_and_patch_artifact_layer

remaining_gate:
  patch_application:
    status: explicit_authorization_required
    required_before:
      - treating_source_designs_as_post_round6_corrected
      - implementing_templates_against_patched_source_text_without_overlay
    safe_alternative_before_application: >
      Step 4 handoff may reference this record, files 20 and 21, and the seven
      patch artifacts as the intended target state, but must label source patches
      as pending and must not silently assume they were applied.

next_stage:
  authorized_bounded_artifact:
    path: 23-step4-template-implementation-handoff.okf.md
    purpose: prepare_template_implementation_without_creating_templates_or_runtime
  still_prohibited:
    - apply_patches_without_explicit_authorization
    - create_runtime_workflows
    - create_autonomous_agents_or_schedulers
    - execute_prompts
    - mutate_calendar
    - mutate_durable_project_state

acceptance_checks:
  new_round6_files_verified: true
  all_seven_patch_artifacts_recorded: true
  patch_artifacts_and_applied_source_state_distinguished: true
  no_false_claim_of_patch_application: true
  source_integrity_preserved: true
  canonical_name_depth_state_overview_and_routing_resolutions_recorded: true
  Step_4_handoff_boundary_defined: true
  no_domain_schema_redefinition: true
  no_runtime_or_durable_state_mutation: true
