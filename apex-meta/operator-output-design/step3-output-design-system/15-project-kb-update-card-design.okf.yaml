document:
  id: apex-step3-round5-project-kb-update-card-design
  title: APEX Step 3 Round 5 Project KB Update Card Design
  status: validated_design_source
  created_date: 2026-07-11
  repository: leela-spec/apexai-os-meta
  branch: main
  package_path: apex-meta/operator-output-design/step3-output-design-system/
  covers_output_job: J10_Project_KB_Update_Card
  verification:
    verified_by: Marco
    decision: keep
    verification_date: 2026-07-11

scope:
  owns:
    - approved_J10_operator_presentation_design
    - accepted_knowledge_update_surface
    - target_and_provenance_visibility
    - degraded_presentation_behavior
    - minimal_machine_handoff_projection
  must_not_own:
    - project_schema
    - candidate_state_acceptance
    - project_status_overview
    - source_artifact_schema
    - unverified_inference_as_fact

J10:
  output_job: Store accepted project memory compactly.
  artifact: Project_KB_Update_Card
  primary_question: >
    What accepted project knowledge should be stored, where should it go, and
    what existing knowledge does it replace or preserve?

first_screen_card:
  title: Project KB Update
  shows:
    - accepted_input
    - knowledge_change
    - target_location
    - change_type
    - replaced_or_preserved_knowledge
    - provenance
    - execution_decision
    - exact_next_action

essential_sections:
  - accepted_input_reference
  - knowledge_change_summary
  - target_KB_location
  - change_type
  - existing_knowledge_effect
  - provenance
  - durable_effect_if_executed
  - compact_machine_handoff

change_types:
  allowed:
    - add
    - correct
    - supersede
    - consolidate
    - no_update
    - operator_review_needed
  exactly_one_required: true

existing_knowledge_effect:
  allowed:
    - replace
    - preserve
    - consolidate
    - none

operator_actions:
  - execute_update
  - edit_update
  - choose_target
  - preserve_existing
  - mark_no_update
  - request_review
  - defer_update

boundary:
  may:
    - prepare_accepted_KB_update
    - identify_target_and_provenance
    - expose_superseded_or_conflicting_knowledge
    - request_operator_confirmation_before_write
  must_not:
    - accept_candidate_project_state
    - become_project_status_dashboard
    - store_unverified_inference_as_fact
    - duplicate_full_source_artifact

degraded_behavior:
  input_not_accepted:
    change_type: operator_review_needed
    action: route_back_to_J9
  target_location_unclear:
    change_type: operator_review_needed
    action: present_candidate_targets_without_writing
  conflicting_existing_knowledge:
    change_type: operator_review_needed
    action: preserve_both_refs_and_request_resolution
  provenance_missing:
    change_type: no_update
    action: do_not_store_as_fact
  no_durable_knowledge:
    change_type: no_update
    action: close_without_KB_mutation

compact_machine_handoff:
  role: secondary_minimum_projection
  required:
    - accepted_change_ref
    - target_project_ref
    - target_KB_location
    - knowledge_change_type
    - provenance_refs
    - superseded_knowledge_refs
    - update_execution_decision
    - operator_review_flags
  contract_references:
    - .claude/skills/project-kb-manager/references/project-schema.md
    - .claude/skills/project-kb-manager/references/write-rules.md
  schema_redefinition: false

acceptance_checks:
  accepted_input_is_explicit: true
  target_location_is_visible: true
  exactly_one_change_type_is_selected: true
  replaced_and_preserved_knowledge_are_distinguished: true
  provenance_supports_the_update: true
  unverified_inference_is_not_stored_as_fact: true
  execution_decision_is_separate_from_preparation: true
  machine_handoff_contains_only_update_minimum: true
  no_schema_redefinition: true
