# Other Ways to Support

- **Star the repo** — It helps others discover LLM Wiki.
- **Report bugs** — File detailed bug reports so we can fix issues faster.
- **Improve documentation** — Submit PRs that make the docs clearer and more complete.
- **Contribute code** — Check the open issues labeled `help wanted` or `good first issue`.
- **Share your setup** — Tell the community how you use LLM Wiki in your workflow.
