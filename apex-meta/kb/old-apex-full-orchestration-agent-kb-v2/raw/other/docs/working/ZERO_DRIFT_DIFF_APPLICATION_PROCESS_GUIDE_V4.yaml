schema_version: '1.0'
process_id: zero_drift_diff_application_v4
status: machine_readable_connector_only_process
artifact_type: yaml_only
repo: leela-spec/MasterOfArts
path: OpenClaw/07_finalopenclawsystem/docs/working/ZERO_DRIFT_DIFF_APPLICATION_PROCESS_GUIDE_V4.yaml
target_log:
- target_id: TGT-001
  target: machine_readable_only
  status: active
  rule: The process artifact must be structured YAML only, not a human prose guide.
  reason: The requested output is a process object that future agents can execute and validate without interpreting narrative prose.
- target_id: TGT-002
  target: connector_only_execution
  status: active
  rule: The process must describe only ChatGPT browser plus GitHub connector operations.
  forbidden_terms_as_process_options:
  - local_git_checkout
  - local_shell_commands
  - git_apply
  - offline_repo_clone
- target_id: TGT-003
  target: zero_drift_scope
  status: active
  rule: Changes are valid only when they come from the uploaded diff intent or from explicitly logged user-approved target corrections.
source_inputs:
  baseline:
    id: v2
    path: OpenClaw/07_finalopenclawsystem/docs/working/ZERO_DRIFT_DIFF_APPLICATION_PROCESS_GUIDE_V2.md
    role: baseline_process_content
    use_rule: Use as the prior accepted guide state.
  lesson_source:
    id: v3
    path: OpenClaw/07_finalopenclawsystem/docs/working/ZERO_DRIFT_DIFF_APPLICATION_PROCESS_GUIDE_V3.md
    role: quality_signal_only
    use_rule: Mine only connector-only clarity improvements; do not use V3 as a rewrite base.
  authorized_change_intent:
    id: uploaded_unified_diff_for_process_guide_v2
    filename: unifieddiffforprocessfguidev2.md
    role: authorized_connector_only_change_intent
    use_rule: Apply the intent of this diff to remove local/offline ambiguity and add connector-only guardrails.
v3_assessment:
  overall: better_process_quality_but_failed_exact_diff_discipline
  better_than_v2_in:
  - explicit_connector_only_scope
  - explicit_disallowance_of_local_git_checkout
  - explicit_disallowance_of_git_apply
  - explicit_disallowance_of_offline_repo_clone
  - clearer_GitHub_connector_merge_to_main_protocol
  not_okay_because:
  - rewrote_more_sections_than_the_uploaded_diff_authorized
  - added_extra_mistake_and_deviation_entries_not_required_by_the_diff
  - changed_wording_and_schema_keys_beyond_the_intended_connector_only_cleanup
  - created_a_human_process_guide_shape_instead_of_a_strict_machine_readable_process_object
  decision_for_v4: Use V2 as baseline, uploaded diff as authority, V3 as lesson source only.
truth_model:
  patch_validation_equation: branch_file == main_file + intended_diff
  main_update_equation: main_after_merge == validated_branch_tree
  source_of_intended_change: uploaded_unified_diff_or_patchspec
  base_truth: current_main_target_files
  branch_truth: files_on_work_branch_after_connector_update
  merge_truth: GitHub PR merge pinned to validated_head_sha
  disallowed_truth_sources:
  - model_memory
  - inferred_improvements
  - stylistic_rewriting
  - unrelated_repo_state
  - broad_architecture_interpretation
  - local_git_checkout
  - local_shell_commands
  - git_apply
  - offline_repo_clone
allowed_connector_actions:
- get_repo
- compare_commits
- create_branch
- fetch_file
- update_file
- create_file
- create_pull_request
- get_pr_info
- merge_pull_request
forbidden_actions:
- rewrite_target_files_on_main
- reconstruct_files_from_memory
- apply_diff_second_time_directly_to_main
- use_update_file_for_each_target_file_on_main
- merge_without_expected_head_sha
- resolve_conflicts_by_model_rewrite
- introduce_local_git_checkout
- introduce_local_shell_commands
- introduce_git_apply
- introduce_offline_repo_clone
- add_human_prose_process_alternatives
process:
  preflight:
  - step_id: P01
    action: confirm_connector_repo_access
    connector_action: get_repo
    input:
      repository_full_name: owner/repo
    output: repo_metadata
    pass_condition: repo_metadata_available
  - step_id: P02
    action: identify_current_main_state
    connector_action: compare_commits
    input:
      base: main
      head: main
    output: current_main_sha_or_equivalent_compare_metadata
    pass_condition: main_reference_resolves
  - step_id: P03
    action: create_work_branch_from_current_main
    connector_action: create_branch
    input:
      branch_name: patch/<specific-topic>
      sha: <current_main_sha>
    output: work_branch
    pass_condition: branch_created_from_current_main_sha
  - step_id: P04
    action: parse_uploaded_diff_artifacts
    connector_action: none
    input:
      source_instruction_file: <uploaded_diff_or_patchspec>
    output:
    - target_file_allowlist
    - intended_hunks
    - explicit_source_corrections
    pass_condition: target_file_allowlist_is_non_empty
  per_file_patch_loop:
    loop_rule: one_target_file_per_iteration
    steps:
    - step_id: F01
      action: fetch_target_file_from_work_branch
      connector_action: fetch_file
      input:
        path: <target_file>
        ref: <work_branch>
      output: branch_file_before_update
      pass_condition: target_file_content_available
    - step_id: F02
      action: construct_expected_branch_file
      connector_action: none
      input:
      - branch_file_before_update
      - intended_hunk_for_target_file
      output: expected_branch_file_after_update
      pass_condition: only_intended_hunk_regions_changed
    - step_id: F03
      action: skip_noop_hunks
      connector_action: none
      input: intended_hunks
      output: applied_hunks_without_noops
      pass_condition: noop_hunks_not_written_as_changes
    - step_id: F04
      action: update_exactly_one_target_file_on_work_branch
      connector_action: update_file
      input:
        path: <target_file>
        content: <expected_branch_file_after_update>
        branch: <work_branch>
      output: commit_sha
      pass_condition: one_commit_updates_only_current_target_file
    - step_id: F05
      action: compare_work_branch_against_main
      connector_action: compare_commits
      input:
        base: main
        head: <work_branch>
      output: compare_result
      pass_condition: changed_files_equal_expected_cumulative_allowlist
    - step_id: F06
      action: record_file_validation
      connector_action: none
      input:
      - commit_sha
      - compare_result
      - applied_hunks_without_noops
      output: file_validation_record
      pass_condition: validation_record_created_before_next_file
  final_branch_validation:
  - step_id: V01
    action: compare_final_work_branch_against_main
    connector_action: compare_commits
    input:
      base: main
      head: <work_branch>
    output: final_compare_result
    pass_condition: touched_file_inventory_equals_expected_allowlist_plus_explicit_artifacts
  - step_id: V02
    action: validate_no_unexpected_file_surface
    connector_action: none
    input: final_compare_result
    output: unexpected_file_report
    pass_condition: no_unexpected_added_deleted_renamed_or_modified_files
  - step_id: V03
    action: stop_before_merge
    connector_action: none
    input: user_request_state
    output: merge_gate
    pass_condition: do_not_merge_until_user_explicitly_requests_merge
  main_update_after_user_approval:
  - step_id: M01
    action: pin_validated_branch_head_sha
    connector_action: compare_commits
    input:
      base: main
      head: <validated_branch>
    output: validated_head_sha
    pass_condition: validated_head_sha_recorded
  - step_id: M02
    action: create_pull_request
    connector_action: create_pull_request
    input:
      head_branch: <validated_branch>
      base_branch: main
    output: pull_request_number
    pass_condition: pull_request_created
  - step_id: M03
    action: confirm_pull_request_head
    connector_action: get_pr_info
    input:
      pr_number: <pull_request_number>
    output: pull_request_metadata
    pass_condition: pull_request_head_sha_equals_validated_head_sha
  - step_id: M04
    action: merge_with_expected_head_sha
    connector_action: merge_pull_request
    input:
      pr_number: <pull_request_number>
      expected_head_sha: <validated_head_sha>
      merge_method: merge
    output: merge_result
    pass_condition: merge_result_merged_true
  - step_id: M05
    action: confirm_pr_closed_and_merged
    connector_action: get_pr_info
    input:
      pr_number: <pull_request_number>
    output: post_merge_pr_metadata
    pass_condition: state_closed_and_merged_true
  post_merge_landed_change_validation:
  - step_id: L01
    action: sample_files_from_main
    connector_action: fetch_file
    input:
      paths: <selected_changed_files>
      ref: main
    output: sampled_main_files
    pass_condition: expected_changes_present_in_sampled_files
validation_record_schema:
  file_validation:
    path: string
    source_hunks_applied: list
    skipped_hunks: list
    intentional_deviations: list
    github_connector_actions: list
    commit_sha: string
    additions: integer
    deletions: integer
    expected_status: modified|added|deleted
    validation_status: pass|fail|partial
    first_unexpected_difference: string|null
    unresolved_risk: string|null
stop_conditions:
- target_file_not_found_and_no_explicit_fallback
- patch_requires_guessing_intent
- source_diff_contains_ambiguous_or_conflicting_instructions
- branch_compare_shows_unexpected_files
- model_rewrites_file_beyond_diff_scope
- validation_relies_on_confidence_instead_of_compare_or_content_check
- noop_hunk_applied_as_change
- branch_head_sha_differs_from_validated_head_sha_before_merge
- pull_request_not_mergeable
- github_rejects_expected_head_sha
- merge_requires_manual_conflict_resolution
- any_step_introduces_local_git_or_git_apply_or_offline_clone
machine_readability_validation:
  format: yaml
  contains_markdown_headings: false
  contains_fenced_code_blocks: false
  contains_freeform_human_sections: false
  parse_requirement: YAML parser must load this file as one mapping object.
  top_level_required_keys:
  - schema_version
  - process_id
  - status
  - artifact_type
  - target_log
  - source_inputs
  - truth_model
  - allowed_connector_actions
  - forbidden_actions
  - process
  - validation_record_schema
  - stop_conditions
  - machine_readability_validation
