## Matrix: Thema → beste Quelle → warum

| Thema                                   |      Beste Quelle | Warum                                                                 |
| --------------------------------------- | ----------------: | --------------------------------------------------------------------- |
| Rechnung > 250 €                        |           SRC-001 | IHK, sehr konkrete Pflichtangaben, direkt übertragbar                 |
| Kleinbetragsrechnung / Ticket bis 250 € |           SRC-002 | Checkliste, sehr praktisch, P0                                        |
| E-Rechnung B2B                          | SRC-017 + SRC-018 | IHK praktisch, BMF offiziell                                          |
| Ticketing-GoBD / Verfahrensdoku         |           SRC-009 | pretix dokumentiert genau die Schnittstelle Ticketshop → Buchhaltung  |
| Ticketing-Export / Umsatzreport         | SRC-013 + SRC-014 | Eventbrite zeigt Ticketumsatz, Gebühren, Steuern, Vertriebskanäle     |
| ticket.io-Abrechnung                    | SRC-011 + SRC-012 | Umsatzübersicht, Rechnung, Auszahlung, Gutschrift                     |
| Vereinsbuchhaltung / Kontenrahmen       | SRC-005 + SRC-019 | DATEV technisch stark, Deutsches Ehrenamt praxisnah                   |
| GoBD-Archiv                             | SRC-007 + SRC-008 | DATEV praktisch, BMF offiziell                                        |
| KSK / Veranstalter                      | SRC-003 + SRC-004 | KSK und DRV, direkt prüfungsrelevant                                  |
| Event-USt / Festveranstaltung           | SRC-015 + SRC-016 | Finanzverwaltung + eventnahes Merkblatt, aber Gemeinnützigkeitsrisiko |
| Auslagenerstattung                      |           SRC-020 | Gute Abgrenzung Auslage vs. Vergütung                                 |
| Venue / Mindestumsatz                   |        Noch Lücke | Quellenlage schwach; eher Eventrecht-Kanzlei/Mustervertrag nötig      |

## Quellen, die gut aussehen, aber riskant sind

| Quelle                                                     | Risiko                                                                                                                         |
| ---------------------------------------------------------- | ------------------------------------------------------------------------------------------------------------------------------ |
| **LfSt Bayern Merkblatt Festveranstaltungen**              | Sehr nützlich, aber stark Vereins-/Gemeinnützigkeits-/Sphärenlogik; nicht blind auf nicht gemeinnützigen e.V. übertragen.      |
| **DATEV SKR42**                                            | Technisch hochwertig, aber für Vereine/Stiftungen/gGmbHs und oft gemeinnützige Körperschaften gedacht.                         |
| **Deutsches Ehrenamt / Vereinswelt**                       | Praxisnah, aber häufig mit Gemeinnützigkeit, Zweckbetrieb, Spendenlogik; Safer Space muss Negativabgrenzung markieren.         |
| **Ticketing-Anbieter-Dokus**                               | Praktisch für Exporte/Reports, aber keine steuerliche Autorität.                                                               |
| **Eventrecht-/Mustervertragsseiten zu Venue**              | Praktisch, aber rechtlich/steuerlich nicht abschließend; individuelle Clubdeals brauchen Vertragsprüfung.                      |
| **Auslagen-/Ehrenamtsvorlagen aus Sport-/Kirchenvereinen** | Können Beleglogik liefern, enthalten aber oft Spendenverzicht/Zuwendungsbestätigung; für Safer Space aktuell nicht übernehmen. |

## Wichtigster nächster Recherchebedarf

**Venue-Settlement** ist die größte Lücke: Mindest-Barumsatz, wer Getränke verkauft, wer Rechnung/Gutschrift ausstellt, ob Safer Space eine Ausgleichszahlung schuldet, und wie das in USt/EÜR landet. Dafür braucht ihr wahrscheinlich eine Mischung aus **Eventrecht-Mustervertrag**, **konkretem Clubvertrag** und **Steuerberatung**.
