gap_closure_research_result:
  executive_summary:
    most_critical_remaining_gaps:
      - "Fehlende Dokumentation des umsatzsteuerlichen Risikos bei Mindestbarumsatz-Klauseln (Differenzzahlung als unechter Schadensersatz vs. echter Schadensersatz)."
      - "Latente Gemeinnützigkeits-Kontamination in den Standard-Vereinsleitfäden bezüglich Aufwandsentschädigungen und Ehrenamtspauschalen, die für den Safer Space e.V. strikt unzulässig sind."
      - "Ungeklärte steuerliche Behandlung von 'Donation Tickets' bei einem nicht gemeinnützigen e.V. – hier droht die Einstufung als voll steuerbares Entgelt ohne Spendencharakter."
    sources_that_are_not_good_enough:
      - "Wegweiser Bürgergesellschaft: Setzt implizit Gemeinnützigkeit voraus, vermischt steuerfreie Pauschalen (§ 3 Nr. 26/26a EStG) mit allgemeinem Vereinsrecht."
      - "Deutsches Ehrenamt Auslagenersatz: Oberflächlicher Blogartikel ohne konkrete Buchungsanweisungen oder Verweise auf die strenge Trennung beim nicht gemeinnützigen e.V."
      - "Allgemeine Event-Blogs (wie EVENTFAQ oder Beck Law): Bieten rechtliche Orientierung zum Mietrecht, ignorieren jedoch die steuerliche Abwicklung der Mindestumsatzgarantie vollständig."
    sources_that_are_real_guides:
      - "KSK Informationsschrift Nr. 4 für Veranstalter: Exzellentes, rechtssicheres Merkblatt mit klaren Abgrenzungskriterien für die Künstlersozialabgabe."
      - "Umsatzsteuer-Anwendungserlass (UStAE) zu § 12 Abs. 2 Nr. 7 UStG: Absolute Primärquelle zur Abgrenzung zwischen begünstigten Konzerten (7 %) und regulären Club-Events (19 %)."
      - "pretix Fiscal Requirements & Taxes Documentation: Hochwertige technische Umsetzungshilfe, die Umsatzsteuerlogik, Rechnungsstellung und Stornoprozesse GoBD-konform abbildet."
    sources_to_download_now:
      - "https://www.kuenstlersozialkasse.de/fileadmin/Dokumente/Mediencenter_Unternehmer_Verwerter/Informationsschriften/Info_04_Abgabepflicht_von_Veranstaltern.pdf"
      - "https://www.deutsche-rentenversicherung.de/SharedDocs/Formulare/DE/_pdf/K5001.pdf"
      - "https://www.gesetze-im-internet.de/ustdv_1980/__33.html"
    sources_to_discard:
      - "Sämtliche allgemeinen Vereinsratgeber, die von 'steuerbegünstigten Körperschaften' sprechen, da Safer Space e.V. voll steuerpflichtig im wirtschaftlichen Geschäftsbetrieb agiert."

