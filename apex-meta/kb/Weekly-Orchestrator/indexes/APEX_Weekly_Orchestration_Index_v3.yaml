deduplication_rules:
  - "One canonical semantic record per current live path."
  - "Promoted J-card is the default human-facing view; original package template is a secondary contract-oriented view."
  - "Step 6 status supersedes Step 3 implementation-readiness claims."
  - "Step 5 map owns source-to-live-template path resolution."
  - "Historical handoffs and patches are provenance, never current behavior authority."
  - "Generated SQLite/JSON/NDJSON search indexes are retrieval infrastructure, not duplicate semantic sources."
  - "Backup, recovery, source-knowledge, and old-version copies are excluded unless a live file cites them as source doctrine."
  - "When two files share the same blob hash, index one content record and list the other path as alias."
