# CURRENT-SYSTEM-MANIFEST — stable live map for Multi-Agent Orchestration inside APEX OS.
# Resolve branch, revision, and checkout root at execution or audit time; do not embed stale
# workspace metadata as system truth. Every path classified live must resolve in the checkout.

manifest:
  canonical_name: "Multi-Agent Orchestration"
  parent_system: "APEX OS"
  classification: "orchestration_system"
  activation: "explicit_operator_request_only"
  source_revision: "resolve_at_read_time"

multi_agent_orchestration:
  entrypoint: { path: apex-meta/orchestration/00-START-HERE.md, class: live }
  architecture: { path: apex-meta/orchestration/ARCHITECTURE.md, class: live }
  glossary: { path: apex-meta/orchestration/GLOSSARY.md, class: live }
  schemas:
    - { path: apex-meta/orchestration/schemas/handoff-packet.schema.md, class: live }
    - { path: apex-meta/orchestration/schemas/authority-state.schema.md, class: live }
    - { path: apex-meta/orchestration/schemas/review-verdict.schema.md, class: live }
  workflows:
    - { path: apex-meta/orchestration/workflows/orchestrator-run.md, class: live }
    - { path: apex-meta/orchestration/workflows/detective-review.md, class: live }
  doctrine:
    manifest: { path: apex-meta/orchestration/agents/DOCTRINE-MANIFEST.md, class: live }
    domains:
      - apex-meta/orchestration/agents/alfred/
      - apex-meta/orchestration/agents/meta-strategy/
      - apex-meta/orchestration/agents/meta-ops/
      - apex-meta/orchestration/agents/meta-detective/
      - apex-meta/orchestration/agents/knowledge-bank/
      - apex-meta/orchestration/agents/informatics-design/
      - apex-meta/orchestration/agents/prompts-workflows/
  regression_corpus: { path: apex-meta/orchestration/user-stories/, class: supporting }
  simulations: { path: apex-meta/orchestration/simulations/, class: supporting }

runtime_surfaces:
  agents_dir:
    path: .claude/agents/
    classification: shared_runtime_location_not_shared_orchestration
  agent_definitions:
    - { name: alfred, system: multi_agent_orchestration, mode: main_conversation_contract }
    - { name: meta-strategy, system: multi_agent_orchestration, mode: spawned_when_routed }
    - { name: meta-ops, system: multi_agent_orchestration, mode: main_conversation_contract }
    - { name: meta-detective, system: multi_agent_orchestration, mode: spawned_when_routed }
    - { name: knowledge-bank, system: multi_agent_orchestration, mode: spawned_when_routed }
    - { name: informatics-design, system: multi_agent_orchestration, mode: spawned_when_routed }
    - { name: prompts-workflows, system: multi_agent_orchestration, mode: spawned_when_routed }
  deterministic_compute:
    - { path: scripts/apex_sync.py, class: live, policy: dry_run_first }
  detective_support_skill: .claude/skills/source-authority-and-verdict-packet/
  routing_doctrine_reference: .claude/skills/AIRouting/references/legacy-v2-doctrine/

shared_backbone:
  canonical_name: "Plan-Sync-Session Backbone"
  classification: "shared_capability_backbone_not_orchestration_system"
  packages:
    - { path: .claude/skills/apex-plan/, role: proposal_and_decomposition }
    - { path: .claude/skills/apex-sync/, role: deterministic_computation }
    - { path: .claude/skills/apex-session/, role: confirmed_mutation_and_closure }
  multi_agent_integration: apex-meta/orchestration/agents/meta-ops/INTEGRATION-apex-plan-sync-session.md

supporting_capabilities:
  - { path: .claude/skills/apex-kb/, role: kb_lifecycle }

durable_state:
  registry: apex-meta/registry/index.md
  epics: apex-meta/epics/
  handoff: apex-meta/handoff/

separate_orchestration_system:
  canonical_name: "Weekly Orchestrator"
  runtime_entrypoint: .claude/skills/weekly-orchestrator/SKILL.md
  design_kb: apex-meta/kb/Weekly-Orchestrator/
  relationship:
    - "does_not_auto_activate_multi_agent_orchestration"
    - "is_not_absorbed_by_multi_agent_orchestration"
    - "cross_system_transfer_requires_explicit_instruction_packet_or_confirmed_artifact"

historical:
  - { path: apex-meta/fable-orchestrator/, note: "design initiative and audit trail; former working name, not live system name" }
  - { path: apex-meta/kb/old-apex-full-orchestration-agent-kb-v2/, note: "source doctrine corpus, not runtime" }
  - { path: apex-meta/kb/old-apex-full-orchestration-agent-kb/, note: "source-doctrine dependents; not runtime" }

open_items:
  authority: apex-meta/orchestration/ARCHITECTURE.md
  rule: "Do not infer completion, branch, commit, simulation, or validation status from this manifest."
