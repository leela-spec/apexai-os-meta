schema: apex.kb.run-config.v2

kb:
  id: narm-personal-development
  title: NARM-Informed Personal Development and Reflection Knowledge Base
  purpose: >
    Build a private, source-preserving knowledge base that explains NARM theory,
    connects it carefully to the operator's documented observations and working
    formulations, compares it with Jungian concepts, Hawkins-style surrender,
    ACIM, and practical intention methods, and produces a source-cited,
    safety-bounded operating system for acute emotional activation, daily
    practice, therapy preparation, relationship decisions, and long-term
    personal development.

source:
  repository: leela-spec/apexai-os-meta
  ref: main
  root: C:\GitDev\apexai-os-meta
  folders:
    - apex-meta/kb/therapy/raw/notes

destination:
  repository: leela-spec/apexai-os-meta
  root: C:\GitDev\apexai-os-meta
  folder: apex-meta/kb/therapy-narm-personal-development

exclusions: []

lifecycle_hint_rules: []

authority_hint_rules:
  - path: apex-meta/kb/therapy/raw/notes/ET-Heller-NARM.md
    hint: >
      Primary theory source for NARM definitions, developmental-trauma concepts,
      core needs, survival adaptations, regulation, therapeutic stance, and
      methods. It is not evidence of a personal diagnosis.
    score: 95
  - path: apex-meta/kb/therapy/raw/notes/Psychological_Handover_Medical_Grade_v1.md
    hint: >
      Primary personal working-formulation and support-boundary source. Treat all
      psychological statements as self-report or working hypotheses, not diagnosis.
    score: 85
  - path: apex-meta/kb/therapy/raw/notes/PsychologicalHandover_ChatTherapeuticFramework_inACIM.md
    hint: >
      Personal reflection and support-framework source. Preserve its stated
      caution that it is not a formal diagnosis.
    score: 80
  - path: apex-meta/kb/therapy/raw/notes/MyTherapy.md
    hint: >
      Personal process-design source connecting betrayal, grief, anger, Jungian,
      Hawkins, ACIM, CBT, and practical-development ideas.
    score: 80
  - path: apex-meta/kb/therapy/raw/notes/Anamesebogen.md
    hint: >
      Operator self-report about goals, health constraints, energy limitations,
      and preferred therapeutic approaches. Do not infer medical diagnosis,
      treatment, prognosis, or exertion guidance.
    score: 80
  - path: apex-meta/kb/therapy/raw/notes/Notion_Surrender_Page.md
    hint: >
      Source for surrender and Hawkins-oriented practice material. Treat it as a
      framework source, not clinical evidence.
    score: 65
  - path: apex-meta/kb/therapy/raw/notes/ManifestationHowTo.md
    hint: >
      Source for practical intention encoding and embodied practice design.
      Distinguish its design claims from established clinical evidence.
    score: 60
  - path: apex-meta/kb/therapy/raw/notes/shadow_insight_v1.md
    hint: Personal insight source; preserve its stated maturity as a fresh breakthrough.
    score: 60
  - path: apex-meta/kb/therapy/raw/notes/shadow_insight_v2.md
    hint: Personal insight source; preserve its stated maturity as an unfolding insight.
    score: 60
  - path: apex-meta/kb/therapy/raw/notes/shadow_insight_v3.md
    hint: Personal insight source; preserve its stated maturity as unfolding pattern recognition.
    score: 60

topics:
  - topic_id: narm-model-and-core-needs
    name: NARM Model, Core Needs, Survival Adaptations, and Therapeutic Principles
    primary_phrases: [NARM, developmental trauma, contact survival structure, core needs]
    aliases: [NeuroAffective Relational Model, relational trauma, developmental needs, survival adaptations]
    supporting_terms: [connection, attunement, trust, autonomy, love and sexuality, shame, guilt, contact, disconnection, regulation, titration, pendulation, containment]
    negative_terms: [diagnosis, cure]
    ambiguous_terms: [trauma, attachment, regulation]
    target_queries:
      - query_id: narm-q01
        priority: critical
        question: What are NARM's core needs, survival adaptations, and central developmental-trauma concepts?
        answer_requirements:
          - Define each term from the NARM source with source pointers.
          - Distinguish theory statements from personal application.
          - Do not infer that the operator has a diagnosis or a particular survival style.
      - query_id: narm-q02
        priority: critical
        question: Which NARM principles and methods address contact, disconnection, shame, regulation, and relational safety?
        answer_requirements:
          - Name each method or principle.
          - Explain its stated purpose and mechanism.
          - State safety limits and when professional support is appropriate.
      - query_id: narm-q03
        priority: routine
        question: How does NARM distinguish developmental trauma from shock trauma, and why does that distinction matter here?
        answer_requirements:
          - Use direct NARM source evidence.
          - Keep any personal relevance explicitly provisional.
    expected_routes:
      dossier: wiki/concepts/narm-model-and-core-needs.md
      source_atlas: wiki/summaries/narm-model-and-core-needs-source-atlas.md

  - topic_id: personal-pattern-map
    name: Personal Pattern Map, Strengths, Constraints, and Documented Observations
    primary_phrases: [betrayal, exclusion, anger, grief, relational vigilance]
    aliases: [moral injury, injustice rumination, responsibility inflation, relationship rupture, social exposure]
    supporting_terms: [mistrust, loneliness, self-compassion, shame, boundaries, trust, PEM, PESE, autonomic dysregulation, energy constraints]
    negative_terms: [diagnosis, personality disorder, cure]
    ambiguous_terms: [trauma, burnout, PTSD]
    target_queries:
      - query_id: personal-q01
        priority: critical
        question: What recurring triggers, emotional sequences, and relational patterns are explicitly documented in the personal sources?
        answer_requirements:
          - Separate raw self-report from later interpretation.
          - Organize observations by trigger, emotion, protective response, cost, and stated need.
          - Preserve strengths and protective factors alongside difficulties.
      - query_id: personal-q02
        priority: critical
        question: What observations support the pattern that anger may protect grief, vulnerability, loneliness, or fear of exclusion?
        answer_requirements:
          - Cite each supporting personal source.
          - Label the conclusion as a source-backed personal pattern, not a diagnosis.
          - Note contradictions, exceptions, and open questions.
      - query_id: personal-q03
        priority: routine
        question: What health, energy, and capacity constraints should shape any recommended routine or development plan?
        answer_requirements:
          - Use only explicit self-reported constraints.
          - Do not provide medical diagnosis, treatment, prognosis, or exertion advice.
          - Identify low-load, pacing-sensitive design implications.
    expected_routes:
      dossier: wiki/concepts/personal-pattern-map.md
      source_atlas: wiki/summaries/personal-pattern-map-source-atlas.md

  - topic_id: narm-personal-match-map
    name: NARM-to-Personal Pattern Match Map
    primary_phrases: [NARM personal match, core needs, survival adaptation, contact]
    aliases: [theory to self-observation, NARM formulation, pattern mapping]
    supporting_terms: [betrayal, exclusion, anger, grief, shame, trust, autonomy, connection, regulation, relational safety]
    negative_terms: [diagnosis, cure, certainty]
    ambiguous_terms: [survival style, attachment pattern, trauma response]
    target_queries:
      - query_id: match-q01
        priority: critical
        question: Which NARM concepts have high, medium, or low correspondence with the documented personal observations?
        answer_requirements:
          - Produce a match table with NARM concept, personal evidence, confidence level, uncertainty, and next question.
          - Use high only when multiple sources support the connection.
          - Never present a match as diagnosis or clinical certainty.
      - query_id: match-q02
        priority: critical
        question: Which core needs, contact patterns, or survival adaptations are most useful hypotheses to explore with a therapist or through careful reflection?
        answer_requirements:
          - Distinguish direct evidence, behavioral inference, working hypothesis, and practitioner question.
          - Include counterevidence and unresolved ambiguity.
          - Identify which questions require professional exploration.
      - query_id: match-q03
        priority: routine
        question: What are the highest-leverage personal development targets suggested by the NARM-to-observation map?
        answer_requirements:
          - Rank targets by evidence fit, personal relevance, safety, energy cost, and likely impact.
          - Do not promise cure or outcome certainty.
    expected_routes:
      dossier: wiki/concepts/narm-personal-match-map.md
      source_atlas: wiki/summaries/narm-personal-match-map-source-atlas.md

  - topic_id: framework-integration
    name: NARM, Jungian, Surrender, Hawkins, ACIM, and Practical-Method Integration
    primary_phrases: [Jung, surrender, Hawkins, ACIM, shadow work]
    aliases: [letting go, forgiveness, grievance release, spiritual release, practical intention encoding]
    supporting_terms: [anger, grief, boundaries, non-attack, individuation, self-compassion, embodiment, ritual, action anchor]
    negative_terms: [spiritual bypassing, forced positivity, denial of facts]
    ambiguous_terms: [forgiveness, surrender, manifestation]
    target_queries:
      - query_id: integration-q01
        priority: critical
        question: Where do NARM, Jungian shadow work, Hawkins-style surrender, ACIM, and practical intention encoding complement one another?
        answer_requirements:
          - Attribute each framework's claims to its own source.
          - State compatible mechanisms and practical overlaps.
          - Do not collapse distinct frameworks into one theory.
      - query_id: integration-q02
        priority: critical
        question: Where can these frameworks conflict, become unsafe, or lead to spiritual bypassing, forced positivity, denial of boundaries, or premature forgiveness?
        answer_requirements:
          - Name specific risks.
          - Provide source-bounded guardrails.
          - Preserve the distinction between release, reconciliation, and renewed access.
      - query_id: integration-q03
        priority: routine
        question: What integrated sequence can support anger, grief, discernment, boundary setting, surrender, and compassionate action without bypassing reality?
        answer_requirements:
          - Define the sequence as a reflective operating hypothesis.
          - State when to pause or seek professional support.
          - Cite the contributing framework sources.
    expected_routes:
      dossier: wiki/concepts/framework-integration.md
      source_atlas: wiki/summaries/framework-integration-source-atlas.md

  - topic_id: methods-and-development-operating-system
    name: High-Impact Methods, Emotional Protocols, and Personal Development Operating System
    primary_phrases: [high impact routines, emotional activation, daily practice, personal development plan]
    aliases: [emergency protocol, anger grief protocol, therapy preparation, relationship decision, weekly review]
    supporting_terms: [grounding, containment, orientation, titration, pendulation, self-compassion, staged trust, boundaries, reflection, action anchor, pacing]
    negative_terms: [medical emergency treatment, diagnosis, cure]
    ambiguous_terms: [emergency, crisis, intervention]
    target_queries:
      - query_id: operating-q01
        priority: critical
        question: Which methods are highest priority for the operator, ranked by source support, personal fit, safety, energy cost, and likely impact?
        answer_requirements:
          - Produce Tier 1, Tier 2, Tier 3, and practitioner-supported categories.
          - Include a reasoned score or ranking explanation.
          - State evidence source, personal match evidence, safety boundary, and energy/capacity implications for each method.
      - query_id: operating-q02
        priority: critical
        question: What is the safest source-bounded protocol for acute emotional activation, high anger, grief, relational trigger, or urge to escalate?
        answer_requirements:
          - Include stabilization, orientation, fact-versus-interpretation separation, containment, and decision delay where supported.
          - Clearly state red flags and the boundary for urgent professional or emergency support.
          - Do not provide medical treatment instructions.
      - query_id: operating-q03
        priority: critical
        question: What daily and weekly low-load practices can support regulation, grief access, self-compassion, relationship discernment, and sustainable development?
        answer_requirements:
          - Separate daily, weekly, therapy-preparation, and relationship-review routines.
          - Respect stated health and energy constraints.
          - Define observable signals that a practice is helping, neutral, overwhelming, or counterproductive.
      - query_id: operating-q04
        priority: routine
        question: What staged personal development path is best supported by the combined source material?
        answer_requirements:
          - Organize the path as stabilization, differentiation, integration, relational redesign, and longer-term development.
          - Include review points and uncertainty.
          - Do not represent the sequence as a guaranteed cure or substitute for therapy.
    expected_routes:
      dossier: wiki/concepts/methods-and-development-operating-system.md
      source_atlas: wiki/summaries/methods-and-development-operating-system-source-atlas.md

run_options:
  source_handling: pointer_only
  semantic_depth: deep
  output: query_ready
  non_text: inventory_and_report
  git_metadata: true
  graph_depth: process
  ai_help_after_preflight: true
  max_semantic_repairs: 3

special_constraints:
  - Private repository only. Do not export, transmit, or share personal source content externally.
  - Treat the configured source folder as read-only and preserve it byte-for-byte.
  - Pointer-only custody: record paths, repository state, and hashes without copying source files.
  - Keep NARM theory, personal self-report, source-backed summaries, behavioral inferences, working hypotheses, operator questions, and practitioner questions visibly distinct.
  - Do not diagnose, claim cure, prescribe treatment, provide prognosis, or replace licensed medical or mental-health care.
  - NARM theory may inform reflection and questions but must not be used to infer that the operator has a specific diagnosis or survival style.
  - Rank methods using source support, personal-fit evidence, safety, energy cost, and likely impact.
  - Respect explicit chronic-illness, PEM/PESE, autonomic-dysregulation, and energy-capacity constraints without providing medical advice.
  - Preserve German source formulations where translation would weaken meaning; provide clear English synthesis with source pointers.
  - Treat only NARM, Jungian concepts, Hawkins-style surrender, ACIM, and supplied practical-intention material as named frameworks. Keep any other framework as an operator question until a source and exact name are supplied.
  - Separate emergency-support guidance from medical emergency treatment and include clear professional-support escalation boundaries.
